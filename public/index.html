<!doctype html>
<html lang="en">
    <head>
        <script>
            (function () {
                var path = window.location.pathname;
                var lastSegment = path.split('/').pop() || '';
                var basePath = path.endsWith('/')
                    ? path
                    : (lastSegment.includes('.') ? path.slice(0, path.lastIndexOf('/') + 1) : path + '/');
                var baseElement = document.createElement('base');

                baseElement.href = basePath;
                document.head.appendChild(baseElement);
            })();
        </script>
        <meta charset="UTF-8">
        <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width, minimal-ui">
        <meta name="mobile-web-app-capable" content="yes">

        <title>ExoJS Examples</title>

        <link rel="icon" href="favicon.ico" sizes="any">
        <link rel="icon" href="data:,">
        <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap">
    </head>

    <body>
        <script>
            (function () {
                var script = document.createElement('script');

                script.src = new URL('examples.js', document.baseURI).toString();
                document.body.appendChild(script);
            })();
        </script>
    </body>
</html>
